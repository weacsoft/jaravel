server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:database1.sqlite
    driver-class-name: org.sqlite.JDBC

jaravel:
  # 视图引擎配置（jblade Blade 模板引擎）
  view:
    # 运行时编译模式（默认，需要 JDK）
    # 预编译模式（仅需 JRE，开发时用 BladePrecompilerMain 预编译模板）
    precompiled-mode: false
    # precompiled-package: precompiled/templates.jblade.zip  # 预编译打包文件路径
    # precompiled-classes-dir: precompiled/classes            # 预编译 class 目录路径
    template-dir: templates
    suffix: .blade.java
  # Wire 部分更新模块（Laravel Livewire 风格）
  wire:
    auto-inject-js: true
    js-path: /static/wire.js
  auth:
    default-guard: api
  jwt:
    secret: jaravel-secret-key-change-in-production-must-be-32-bytes
    ttl: 3600000
    refresh-ttl: 604800000
    refresh-enabled: true
    blacklist-store: array
    blacklist-prefix: "jwt:blacklist:"
  migration:
    enabled: true
    table: migrations
    auto-run: true
    source: classpath
  cache:
    default-store: array
    prefix: jaravel
  event:
    queue-enabled: true
    queue:
      default:
        pool-size: 4
    retry:
      max-attempts: 3
      delay-ms: 1000
  # 插件系统配置
  plugin-jar:
    enabled: true
    plugins-dir: plugins
    auto-restore: false
    auto-register: true
    # 多租户插件支持
    multi-tenant:
      enabled: true
      separator: "@"
    # 远程插件执行 P2SP
    remote:
      server:
        enabled: false
        port: 9700
        auth-token: "jaravel-remote-secret"
        node-id: "node-root"
        relay-enabled: false
        max-hops: 5
      client:
        enabled: true
        transport: tcp
        http-endpoint: /rpc
        tree-routing-enabled: false
        max-hops: 5
  plugin-java:
    enabled: true
    source-dir: plugins-java
    auto-scan: true
    auto-register: true

  # Artisan CLI 命令框架
  artisan:
    enabled: true
    make:
      base-package: com.weacsoft.jaravel
      output-dir: src/main/java
      migration-dir: migrations

  # 定时任务调度器
  schedule:
    enabled: true

  # Redis 连接管理（未安装 Redis 时不影响应用启动）
  redis:
    options:
      cluster: redis
      prefix: "jaravel_"
    connections:
      default:
        host: 127.0.0.1
        port: 6379

  # 验证码配置（项目自带 captcha 模块）
  captcha:
    enabled: true
    width: 300
    height: 150
    length: 4                    # 数字/算术验证码字符数量
    expire-seconds: 300
    tolerance: 8.0
    trajectory-enabled: true
    # 干扰强度级别 1-5（1=极轻, 3=中等, 5=极强）
    interference-level: 3
    # 字体配置（null=自动检测系统字体）
    font-family: null
    cjk-font-family: null        # 中文字体，null=自动检测系统可用字体
    font-path: null              # 自定义字体文件路径(.ttf/.otf)
    # 点选验证码配置
    click-target-count: 3        # 需要点选的目标文字数量
    click-decoy-count: 3         # 干扰文字数量
    # 数据加密配置（none=不加密纯Base64, aes=AES/CBC, rsa=RSA/OAEP）
    encryption-type: aes
    encryption-key: jaravel-captcha-default-key  # 生产环境请修改
    # 自定义背景图（滑动/旋转验证码，支持多张随机选择）
    # background-images:
    #   - classpath:captcha/bg1.jpg
    #   - classpath:captcha/bg2.jpg

logging:
  level:
    com.weacsoft.jaravel: DEBUG
    gaarason.database: INFO
