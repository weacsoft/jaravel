server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:database1.sqlite
    driver-class-name: org.sqlite.JDBC

jaravel:
  auth:
    default-guard: api
  jwt:
    secret: jaravel-secret-key-change-in-production-must-be-32-bytes
    ttl: 3600000
    refresh-ttl: 604800000
    refresh-enabled: true
    blacklist-store: array
    blacklist-prefix: "jwt:blacklist:"
  migration:
    enabled: true
    table: migrations
    auto-run: true
    source: classpath
  cache:
    default-store: array
    prefix: jaravel
  event:
    queue-enabled: true
    queue:
      default:
        pool-size: 4
    retry:
      max-attempts: 3
      delay-ms: 1000
  # 插件系统配置
  plugin-jar:
    enabled: true
    plugins-dir: plugins
    auto-restore: false
    auto-register: true
    # 多租户插件支持
    multi-tenant:
      enabled: true
      separator: "@"
    # 远程插件执行 P2SP
    remote:
      server:
        enabled: false
        port: 9700
        auth-token: "jaravel-remote-secret"
        node-id: "node-root"
        relay-enabled: false
        max-hops: 5
      client:
        enabled: true
        transport: tcp
        http-endpoint: /rpc
        tree-routing-enabled: false
        max-hops: 5
  plugin-java:
    enabled: true
    source-dir: plugins-java
    auto-scan: true
    auto-register: true

  # Artisan CLI 命令框架
  artisan:
    enabled: true
    make:
      base-package: com.weacsoft.jaravel
      output-dir: src/main/java
      migration-dir: migrations

  # 定时任务调度器
  schedule:
    enabled: true

  # Redis 连接管理（未安装 Redis 时不影响应用启动）
  redis:
    options:
      cluster: redis
      prefix: "jaravel_"
    connections:
      default:
        host: 127.0.0.1
        port: 6379

logging:
  level:
    com.weacsoft.jaravel: DEBUG
    gaarason.database: INFO
